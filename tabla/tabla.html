<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tabla de Productos</title>

<style>

.tabla{
    width: 80%;
    margin: 30px auto;
    border-collapse: collapse;
    text-align: center;
    background: white;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

.tabla th{
    background: #e65100;
    color: white;
    padding: 15px;
    font-size: 26px;
}

.tabla td{
    padding: 20px;
    border: 1px solid #ddd;
}

.imagenes img{
    width: 200px;
    height: auto;
    border-radius: 10px;
    border: 2px solid #e65100;
    transition: transform 0.3s ease;
}

.imagenes img:hover{
    transform: scale(1.2);
}

/* ===== ENCABEZADO ===== */
header{
    text-align: center;
    padding: 100px;
    background: linear-gradient(90deg, #e65100, #ce3e1a);
    color: white;
}

.logo{
    width: 170px;
    border-radius: 50%;
    border: 3px solid white;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

/* ===== MENÚ ===== */
nav ul{
    list-style: none;
    padding: 15px;
    margin: 0;
    display: flex;
    justify-content: center;
    background-color: #e65100;
}

nav ul li{
    margin: 0 20px;
}

nav ul li a{
    color: white;
    text-decoration: none;
    font-weight: bold;
}

nav ul li a:hover{
    color: #ffccbc;
}

.menu ul{
    list-style: none;
    display: flex;
    justify-content: center;
    gap: 30px; /* espacio entre botones */
    padding: 0;
    margin: 0;
}

.menu li a{
    text-decoration: none;
    color: white;
    background: #e65100;
    padding: 10px 20px;
    border-radius: 10px;
    font-weight: bold;
}

.menu li a:hover{
    background: #bf360c;
}

</style>

</head>

<body>


    <!-- ===== LOGO Y TITULO ===== -->
